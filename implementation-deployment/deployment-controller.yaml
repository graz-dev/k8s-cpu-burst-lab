apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-boost-controller
  namespace: cpu-burst-demo
  labels:
    app.kubernetes.io/name: startup-boost-controller
    demo/implementation: deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: startup-boost-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: startup-boost-controller
    spec:
      nodeSelector:
        demo/role: worker

      serviceAccountName: startup-boost-controller

      volumes:
        - name: hooks
          configMap:
            name: startup-boost-hook
            defaultMode: 0755

      containers:
        - name: controller
          # bitnami/kubectl ships kubectl 1.32+ which supports --subresource=resize.
          image: bitnami/kubectl:latest
          # Override ENTRYPOINT=["kubectl"] to run our controller script instead.
          command: ["/bin/sh", "/hooks/controller.sh"]

          volumeMounts:
            - name: hooks
              mountPath: /hooks

          env:
            - name: CONTROLLER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            - name: STEADY_CPU
              value: "300m"
            - name: STEADY_MEMORY
              value: "512Mi"
            - name: CONTAINER_NAME
              value: "petclinic"
            - name: POLL_INTERVAL
              value: "10"

          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
