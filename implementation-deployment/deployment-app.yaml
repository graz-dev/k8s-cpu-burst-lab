apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: cpu-burst-demo
  labels:
    app.kubernetes.io/name: petclinic
    demo/implementation: deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: petclinic
  template:
    metadata:
      labels:
        app.kubernetes.io/name: petclinic
        # This label is the trigger: the controller only watches pods with
        # startup-boost=enabled. Remove the label to opt-out a workload.
        startup-boost: "enabled"
    spec:
      nodeSelector:
        demo/role: worker

      # No special ServiceAccount needed — the app has no K8s API access.
      # The controller pod handles all API calls.

      containers:
        - name: petclinic
          image: ghcr.io/graz-dev/spring-petclinic-jdk25:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080

          # ── Burst resources (startup phase) ────────────────────────────────
          # The controller will patch these down to steady-state after the Ready
          # condition transitions to True.
          resources:
            requests:
              cpu: "1500m"    # Burst (JIT compilation peak, scaled for 4-CPU kind node)
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"

          # ── Prevent JVM restart when CPU is changed in-place ───────────────
          resizePolicy:
            - resourceName: cpu
              restartPolicy: NotRequired
            - resourceName: memory
              restartPolicy: NotRequired

          # ── Health probes ──────────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 40
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3

          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
            - name: OTEL_SDK_DISABLED
              value: "true"
