---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: startup-boost-controller
  namespace: cpu-burst-demo

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: startup-boost-controller
  namespace: cpu-burst-demo
rules:
  # Read and watch pods to detect Ready transitions.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Submit in-place resize patches via the dedicated subresource (K8s 1.35+ GA).
  # kubectl patch --subresource=resize does GET then PATCH, so both verbs are required.
  - apiGroups: [""]
    resources: ["pods/resize"]
    verbs: ["get", "patch", "update"]

  # Annotate pods after resize (anti-Shrinkage-Trap guard).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: startup-boost-controller
  namespace: cpu-burst-demo
subjects:
  - kind: ServiceAccount
    name: startup-boost-controller
    namespace: cpu-burst-demo
roleRef:
  kind: Role
  name: startup-boost-controller
  apiGroup: rbac.authorization.k8s.io
