apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-boost-operator
  namespace: cpu-burst-demo
  labels:
    app.kubernetes.io/name: startup-boost-operator
    demo/implementation: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: startup-boost-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: startup-boost-operator
    spec:
      nodeSelector:
        demo/role: worker

      serviceAccountName: startup-boost-operator

      containers:
        - name: manager
          image: ghcr.io/graz-dev/startup-boost-operator:latest
          imagePullPolicy: IfNotPresent

          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          command: ["/manager"]
          args:
            - --leader-elect=false
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080

          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true

      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      terminationGracePeriodSeconds: 10
