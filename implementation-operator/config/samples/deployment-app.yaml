apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: cpu-burst-demo
  labels:
    app.kubernetes.io/name: petclinic
    demo/implementation: operator-crd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: petclinic
  template:
    metadata:
      labels:
        app.kubernetes.io/name: petclinic
    spec:
      nodeSelector:
        demo/role: worker

      containers:
        - name: petclinic
          image: ghcr.io/graz-dev/spring-petclinic-jdk25:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080

          resources:
            requests:
              cpu: "1500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"

          # The controller will patch cpu to steadyCPU after this pod is Ready.
          # NotRequired tells the kubelet not to restart the container on resize.
          resizePolicy:
            - resourceName: cpu
              restartPolicy: NotRequired
            - resourceName: memory
              restartPolicy: NotRequired

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 40
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3

          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
            - name: OTEL_SDK_DISABLED
              value: "true"
