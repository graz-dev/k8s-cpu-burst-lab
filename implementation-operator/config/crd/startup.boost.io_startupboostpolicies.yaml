apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: startupboostpolicies.startup.boost.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
spec:
  group: startup.boost.io
  names:
    kind: StartupBoostPolicy
    listKind: StartupBoostPolicyList
    plural: startupboostpolicies
    singular: startupboostpolicy
    shortNames:
      - sbp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Selector
          type: string
          jsonPath: .spec.selector.matchLabels
        - name: SteadyCPU
          type: string
          jsonPath: .spec.containers[0].steadyCPU
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [selector, containers]
              properties:
                selector:
                  description: Selector identifies which pods this policy manages.
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    matchExpressions:
                      type: array
                      items:
                        type: object
                        required: [key, operator]
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          values:
                            type: array
                            items:
                              type: string
                containers:
                  description: Containers lists one entry per container to resize after startup.
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [name, steadyCPU]
                    properties:
                      name:
                        type: string
                        description: Name of the container within the pod spec.
                      steadyCPU:
                        type: string
                        description: CPU quantity to resize to once the pod is Ready (e.g. "300m").
                stabilizationSeconds:
                  description: Seconds to wait after Ready before submitting the resize. Default 0.
                  type: integer
                  default: 0
                  minimum: 0
            status:
              type: object
              properties:
                boostedPods:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      phase:
                        type: string
                        enum: [Burst, Ready, Steady, Failed]
                      resizedAt:
                        type: string
                        format: date-time
                      steadyCPU:
                        type: string
                      message:
                        type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
